# INSTRUCTIONS:
# This uses a GitHub Personal Access Token (PAT) — NOT a short-lived registration token.
# The container calls the GitHub API at startup to auto-acquire a registration token.
# The PAT does not expire unless revoked, so this secret only needs to be created once.
#
# 1. Go to: https://github.com/settings/tokens/new
# 2. Set a note (e.g. "k8s-runner-ad-build-test")
# 3. Select the following scopes:
#      - repo (all)
#      - workflow
#      - admin:org (all)  <-- required for org-level runner
#      - admin:public_key > read:public_key
#      - admin:repo_hook  > read:repo_hook
#      - admin:org_hook
#      - notifications
# 4. Click Generate token and copy the value
# 5. Replace REPLACE_WITH_GITHUB_PAT below with that value
# 6. Apply this file: kubectl apply -f runner-token-secret.yaml
#
# NOTE: Do NOT commit this file with a real token in it.
apiVersion: v1
kind: Secret
metadata:
  name: actions-runner
  namespace: github-runner-test
type: Opaque
stringData:
  ACCESS_TOKEN: "REPLACE_WITH_GITHUB_PAT"
